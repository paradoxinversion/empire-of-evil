      <div class="eoe-attr-row"><div class="eoe-attr-label">STRENGTH</div><div class="eoe-attr-val">${p.str}</div></div>
      <div class="eoe-attr-row"><div class="eoe-attr-label">CONSTITUTION</div><div class="eoe-attr-val">${p.con}</div></div>
      <div class="eoe-attr-row"><div class="eoe-attr-label">AGILITY</div><div class="eoe-attr-val">${p.agi}</div></div>
      <div class="eoe-attr-row"><div class="eoe-attr-label">INTELLIGENCE</div><div class="eoe-attr-val">${p.int}</div></div>
      <div class="eoe-attr-row"><div class="eoe-attr-label">LEADERSHIP</div><div class="eoe-attr-val">${p.lead}</div></div>
      <div class="eoe-attr-row"><div class="eoe-attr-label">ADMINISTRATION</div><div class="eoe-attr-val">${p.admin}</div></div>

    <div style="font-size:11px;color:#94a3b8;line-height:1.9;">${p.skills}</div>
    <div class="eoe-btn-row">
      <button class="eoe-action-btn">REASSIGN</button>
      <button class="eoe-action-btn">MOVE</button>
      <button class="eoe-action-btn red">TERMINATE</button>
    </div>`;
}

var plotDetails = {
  'Reconnaissance': { tier: 'T1', cat: 'ESPIONAGE & INTELLIGENCE', desc: 'Gather intelligence on a foreign zone. Raises zone intel level; reduces margin of error on subsequent reports. A prerequisite for more ambitious operations.', req: [{ok:true,txt:'1+ agents available'},{ok:true,txt:'Target zone selected'},{ok:false,txt:'Target zone: not selected'}], time: '7–10 days (incl. travel)', evil: '+1', ready: true },
  'Spread Conspiracy Theories': { tier: 'T1', cat: 'SOCIAL ENGINEERING', desc: 'Seed conspiracy theories among citizens in a target zone. A portion of citizens gain the Conspiracy Theory status effect, reducing their intelligence and potentially shifting loyalty toward the empire. Effects spread person-to-person daily.', req: [{ok:true,txt:'Deception skill agent'},{ok:true,txt:'Money: $200'},{ok:false,txt:'Target zone: not selected'}], time: '5 days', evil: '+2', ready: false },
  'Surveillance Tap': { tier: 'T1', cat: 'ESPIONAGE & INTELLIGENCE', desc: 'Plant listening devices in key locations in a target zone. While active, provides an ongoing intelligence feed and begins generating Intercepted Communication events for that zone.', req: [{ok:true,txt:'Surveillance skill agent'},{ok:false,txt:'Centralized Telecom research'},{ok:false,txt:'Target zone: not selected'}], time: '4 days', evil: '+1', ready: false },
  'False Flag Operation': { tier: 'T2', cat: 'SOCIAL ENGINEERING', desc: 'Attribute an empire action or a fabricated incident to another organization. Reduces perceived EVIL and damages the target org\'s reputation with others. If exposed, perceived EVIL increases significantly.', req: [{ok:true,txt:'Forgery skill agent'},{ok:true,txt:'Deception skill agent'},{ok:false,txt:'Target organization: not selected'}], time: '8 days', evil: '−3 perceived', ready: false },
  'Send Ade': { tier: 'T2', cat: 'POLITICAL MANIPULATION', desc: 'Infiltrate a target zone with cult-like loyalty manipulation. Send them some ade. Cool-ade. Tons and tons of Cool-ade. A portion of citizens develop loyalty to the empire. Player may push further for higher gains and higher risk.', req: [{ok:true,txt:'Persuasion skill agent'},{ok:true,txt:'Oratory skill agent'},{ok:true,txt:'Money: $1,200'},{ok:false,txt:'Target zone: not selected'}], time: '12 days', evil: '+3', ready: false },
  'Inspiring Speech': { tier: 'T1', cat: 'POLITICAL MANIPULATION', desc: 'The Overlord or a high-Oratory agent delivers a rousing address to empire citizens. Generates an empire-wide loyalty boost. Effect scales with the delivering agent\'s Oratory skill.', req: [{ok:true,txt:'Oratory skill agent (Overlord preferred)'},{ok:true,txt:'Communications Strategy research'}], time: '1 day', evil: '+1', ready: true },
  'Purge Foreign Agents': { tier: 'T2', cat: 'ESPIONAGE & INTELLIGENCE', desc: 'Sweep an empire zone for foreign operatives. At low citizen intel levels, innocent citizens may be caught in the sweep — triggering loyalty loss and potential escalation events.', req: [{ok:true,txt:'Counterintelligence skill agent'},{ok:true,txt:'Surveillance skill agent'},{ok:false,txt:'Target empire zone: not selected'}], time: '6 days', evil: '+2', ready: false },
  'Takeover Zone': { tier: 'T3', cat: 'MILITARY', desc: 'Attempt to seize control of a foreign zone. Core military victory mechanic. Preceding with Reconnaissance and Destabilize Zone significantly improves success odds. Combat encounter generated on execution.', req: [{ok:true,txt:'1+ Troop agents'},{ok:false,txt:'Target zone: not selected'},{ok:false,txt:'Recommended: prior Recon (improves success)'}], time: '3–14 days (incl. travel)', evil: '+8', ready: false },
  'Hypno Disco Ball': { tier: 'T4', cat: 'TIER 4 — WORLD-ALTERING', desc: 'Deploy a hyper-refractive light installation capable of broadcasting hypnotic frequencies across an entire zone. Mass loyalty conversion. Affected citizens have a great time, actually. Intelligence reduced.', req: [{ok:false,txt:'Hyper-refractive Materials research'},{ok:false,txt:'Engineering skill agent'},{ok:false,txt:'Scientist agent'},{ok:false,txt:'Science: 800 (current: 340)'}], time: '21 days', evil: '+15', ready: false }
};

function selectPlot(name) {
  var p = plotDetails[name];
  if (!p) return;
  var reqHtml = p.req.map(function(r){ return '<div class="eoe-req-row"><span class="' + (r.ok ? 'eoe-req-check' : 'eoe-req-x') + '">' + (r.ok ? '✓' : '✗') + '</span> ' + r.txt + '</div>'; }).join('');
  document.getElementById('plot-detail-panel').innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
      <span class="eoe-tag tag-t${p.tier.charAt(1)}">${p.tier}</span>
      <span style="font-size:10px;color:#475569;letter-spacing:0.08em;">${p.cat}</span>
    </div>
    <div class="eoe-plot-title">${name}</div>
    <div class="eoe-plot-desc">${p.desc}</div>
    <div class="eoe-section-label">REQUIREMENTS</div>
    ${reqHtml}
    <hr class="eoe-divider">
    <div style="display:flex;gap:16px;font-size:11px;color:#94a3b8;margin-bottom:12px;">
      <span>Execution time: <span style="color:#e2e8f0;">${p.time}</span></span>
      <span>EVIL impact: <span style="color:#c0392b;">${p.evil}</span></span>
    </div>
    <button class="eoe-launch-btn" ${p.ready ? '' : 'disabled'}>${p.ready ? 'LAUNCH PLOT' : 'REQUIREMENTS NOT MET'}</button>`;
}

function resolveEvent(choice) {
  var content = document.getElementById('main-content');
  var effects = {
    'Physical Punishment': { text: 'Agent Brek Thoss has been disciplined. Zone loyalty in Greyvast increases moderately. Agent Thoss remains operational at reduced effectiveness while recovering.', effects: ['+Greyvast loyalty: +5', '−Agent Thoss HP: −18', '·EVIL: no change'] },
    'Terminate Agent': { text: 'Agent Brek Thoss has been TERMINATED. The decision has been communicated to empire personnel via standard channels. Zone citizens are aware of the outcome. Loyalty in Greyvast improves significantly. Empire agents note the precedent.', effects: ['−Agent Thoss: TERMINATED', '+Greyvast loyalty: +12', '+Empire-wide agent loyalty: +2', '+EVIL: +1'] },
    'Fire Agent': { text: 'Agent Brek Thoss has been dismissed from imperial service. He is now a civilian in Greyvast, with substantially diminished loyalty to the empire. The zone\'s response has been muted. Thoss has made no statement.', effects: ['−Agent Thoss: FIRED (now hostile citizen)', '+Greyvast loyalty: +4', '·EVIL: no change'] },
    'Give Bonus': { text: 'Agent Brek Thoss has been compensated for his initiative. Empire accounting has processed the disbursement. Zone response has been unfavorable. Word has gotten around.', effects: ['+Agent Thoss loyalty: +18', '−Greyvast loyalty: −6', '+EVIL: +2', '−Money: $500'] }
  };
  var e = effects[choice];
  var efHtml = e.effects.map(function(ef){ var col = ef.startsWith('+') ? '#16a34a' : ef.startsWith('−') ? '#dc2626' : '#475569'; return '<div class="eoe-effect-row" style="color:'+col+';">'+ef+'</div>'; }).join('');
  content.innerHTML = `<div class="eoe-event-screen">
    <div class="eoe-event-type">EVENT RESOLVED — GONE TOO FAR</div>
    <div class="eoe-event-title" style="font-size:16px;margin-bottom:12px;">Response: ${choice}</div>
    <hr class="eoe-divider">
    <div class="eoe-event-body">${e.text}</div>
    <div class="eoe-event-effects">${efHtml}</div>
    <div style="font-size:11px;color:#475569;margin-bottom:16px;">Simulation will resume when you continue.</div>
    <button class="eoe-opt-btn" onclick="showScreen('empire')">CONTINUE</button>
  </div>`;
}

function advanceDay() {
  var topDate = document.querySelector('.eoe-topbar-center');
  var days = ['47','48','49','50'];
  var months = ['14 MARCH', '15 MARCH', '16 MARCH', '17 MARCH'];
  var i = 0;
  var iv = setInterval(function(){
    i++;
    if (i >= days.length) { clearInterval(iv); return; }
    topDate.textContent = 'DAY ' + days[i] + ' — ' + months[i] + ', YEAR 1';
  }, 300);
}

showScreen('empire');
</script>
